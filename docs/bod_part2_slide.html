<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第2部 開始｜BOD 2026 — 大人の文化祭</title>
<meta name="description" content="Business Open Day 2026 第2部 プロジェクター投影用スライド">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0F1B2D; --navy-2:#1C3048; --navy-3:#26405E;
  --amber:#C8943E; --amber-light:#E8C078; --amber-pale:#FBF5EB;
  --teal:#2B7A78; --paper:#F6F2EA;
}
html,body{
  width:100%; height:100%; overflow:hidden;
  font-family:system-ui,-apple-system,"Segoe UI","Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic UI",YuGothic,Meiryo,sans-serif;
  background:#000; color:#fff;
  -webkit-font-smoothing:antialiased;
}

/* 16:9 投影スライド — 画面いっぱいにフィット */
.slide{
  width:100vw; height:100vh;
  max-width:calc(100vh * 16 / 9);
  max-height:calc(100vw * 9 / 16);
  margin:auto;
  position:relative; overflow:hidden;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  text-align:center;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, rgba(200,148,62,.35), transparent 55%),
    radial-gradient(ellipse 70% 50% at 85% 75%, rgba(43,122,120,.28), transparent 50%),
    radial-gradient(ellipse 50% 40% at 50% 100%, rgba(200,148,62,.15), transparent 60%),
    linear-gradient(145deg, var(--navy) 0%, var(--navy-2) 45%, var(--navy-3) 100%);
}
@media (min-aspect-ratio: 16/9){
  .slide{ width:calc(100vh * 16 / 9); height:100vh; }
}
@media (max-aspect-ratio: 16/9){
  .slide{ width:100vw; height:calc(100vw * 9 / 16); }
}

/* 装飾 */
.sparkle{
  position:absolute; border-radius:50%; pointer-events:none;
  background:radial-gradient(circle, rgba(255,255,255,.9) 0%, transparent 70%);
  animation:float 6s ease-in-out infinite;
}
.sparkle:nth-child(1){ width:6px;height:6px; top:12%; left:8%; animation-delay:0s }
.sparkle:nth-child(2){ width:4px;height:4px; top:22%; right:12%; animation-delay:1.2s }
.sparkle:nth-child(3){ width:8px;height:8px; bottom:28%; left:15%; animation-delay:2.4s }
.sparkle:nth-child(4){ width:5px;height:5px; bottom:18%; right:18%; animation-delay:.8s }
.sparkle:nth-child(5){ width:3px;height:3px; top:40%; left:42%; animation-delay:3s }
@keyframes float{
  0%,100%{ transform:translateY(0) scale(1); opacity:.6 }
  50%{ transform:translateY(-12px) scale(1.2); opacity:1 }
}

.ring{
  position:absolute; border-radius:50%; border:1px solid rgba(200,148,62,.2);
  pointer-events:none;
}
.ring-1{ width:min(90vmin,900px); height:min(90vmin,900px); opacity:.5 }
.ring-2{ width:min(70vmin,700px); height:min(70vmin,700px); border-color:rgba(255,255,255,.08) }

.content{
  position:relative; z-index:2;
  padding:0 clamp(24px, 4vw, 64px);
  max-width:1100px;
}

.eyebrow{
  font-size:clamp(14px, 1.8vw, 22px); font-weight:700;
  letter-spacing:.35em; text-transform:uppercase;
  color:var(--amber-light); margin-bottom:clamp(12px, 2vh, 24px);
  animation:fadeUp .8s ease both;
}
.eyebrow span{
  display:inline-block; padding:6px 18px;
  border:1px solid rgba(200,148,62,.45); border-radius:999px;
  background:rgba(200,148,62,.12);
}

.main-title{
  font-size:clamp(36px, 6.5vw, 88px); font-weight:900;
  line-height:1.08; letter-spacing:.04em;
  margin-bottom:clamp(8px, 1.5vh, 16px);
  text-shadow:0 4px 40px rgba(0,0,0,.35);
  animation:fadeUp .8s .1s ease both;
}
.main-title em{
  font-style:normal;
  background:linear-gradient(90deg, var(--amber-light), var(--amber), #fff8ec);
  -webkit-background-clip:text; background-clip:text; color:transparent;
}

.sub-festival{
  font-size:clamp(22px, 3.2vw, 42px); font-weight:800;
  letter-spacing:.12em; color:#fff;
  margin-bottom:clamp(20px, 3vh, 36px);
  animation:fadeUp .8s .2s ease both;
}
.sub-festival .icon{ color:var(--amber); margin-right:.15em }

.lead{
  font-size:clamp(16px, 2vw, 26px); font-weight:600;
  color:rgba(255,255,255,.82); line-height:1.65;
  margin-bottom:clamp(28px, 4vh, 48px);
  animation:fadeUp .8s .3s ease both;
}

.highlights{
  display:flex; flex-wrap:wrap; justify-content:center; gap:clamp(12px, 2vw, 20px);
  margin-bottom:clamp(24px, 3.5vh, 40px);
  animation:fadeUp .8s .4s ease both;
}
.hl{
  flex:1 1 240px; max-width:320px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  border-radius:16px; padding:clamp(16px, 2.5vw, 28px) clamp(14px, 2vw, 22px);
  backdrop-filter:blur(8px);
  transition:transform .25s, border-color .25s;
}
.hl:hover{ transform:translateY(-3px); border-color:rgba(200,148,62,.45) }
.hl-icon{
  font-size:clamp(28px, 4vw, 40px); line-height:1; margin-bottom:10px;
}
.hl-text{
  font-size:clamp(15px, 1.9vw, 22px); font-weight:700;
  line-height:1.45; color:#fff;
}

.footer-line{
  font-size:clamp(11px, 1.2vw, 15px);
  letter-spacing:.2em; color:rgba(255,255,255,.45);
  animation:fadeUp .8s .55s ease both;
}
.footer-line b{ color:var(--amber); font-weight:700; letter-spacing:.25em }

.pulse-dot{
  display:inline-block; width:10px; height:10px; border-radius:50%;
  background:var(--amber); margin-right:8px; vertical-align:middle;
  animation:pulse 1.5s ease infinite;
}
@keyframes pulse{
  0%,100%{ box-shadow:0 0 0 0 rgba(200,148,62,.6) }
  50%{ box-shadow:0 0 0 12px rgba(200,148,62,0) }
}
@keyframes fadeUp{
  from{ opacity:0; transform:translateY(24px) }
  to{ opacity:1; transform:translateY(0) }
}

/* 印刷・PDF用 */
@media print{
  @page{ size: landscape; margin:0 }
  html,body{ background:#0F1B2D }
  .slide{ width:100%; height:100%; max-width:none; max-height:none }
}
</style>
</head>
<body>
<div class="slide" role="img" aria-label="Business Open Day 2026 第2部 開始スライド">
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <span class="sparkle" aria-hidden="true"></span>
  <span class="sparkle" aria-hidden="true"></span>
  <span class="sparkle" aria-hidden="true"></span>
  <span class="sparkle" aria-hidden="true"></span>
  <span class="sparkle" aria-hidden="true"></span>

  <div class="content">
    <p class="eyebrow"><span>Business Open Day 2026</span></p>

    <h1 class="main-title">これから<br><em>第2部</em>が始まります！</h1>

    <p class="sub-festival"><span class="icon">🎪</span>大人の文化祭</p>

    <p class="lead">
      <span class="pulse-dot" aria-hidden="true"></span>
      円卓を囲んで、ランチと出店ブースを楽しむ<br>
      BNI Grano の特別な午後へ — ワクワクの時間です！
    </p>

    <div class="highlights">
      <div class="hl">
        <div class="hl-icon" aria-hidden="true">🍽️</div>
        <p class="hl-text">美味しいランチ</p>
      </div>
      <div class="hl">
        <div class="hl-icon" aria-hidden="true">💡</div>
        <p class="hl-text">ビジネスチャンスの発見</p>
      </div>
      <div class="hl">
        <div class="hl-icon" aria-hidden="true">✨</div>
        <p class="hl-text">魅力的なサービスを<br>体験できる出店ブース</p>
      </div>
    </div>

    <p class="footer-line"><b>BNI GRANO CHAPTER</b> — 第2部 円卓 · 席替え · 大人の文化祭</p>
  </div>
</div>
</body>
</html>
